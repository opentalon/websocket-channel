<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenTalon WebSocket Chat Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f0f2f5;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #app {
    width: 100%;
    max-width: 720px;
    height: 90vh;
    display: flex;
    flex-direction: column;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    overflow: hidden;
  }

  /* ── Connect screen ── */
  #connect-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 32px;
  }
  #connect-screen h1 { font-size: 1.5rem; color: #111; }
  #connect-screen p  { color: #666; font-size: 0.9rem; text-align: center; }

  .field { display: flex; flex-direction: column; gap: 6px; width: 100%; max-width: 380px; }
  .field label { font-size: 0.8rem; font-weight: 600; color: #555; }
  .field input {
    padding: 10px 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus { border-color: #4f46e5; }

  #connect-btn {
    width: 100%;
    max-width: 380px;
    padding: 11px;
    background: #4f46e5;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  #connect-btn:hover { background: #4338ca; }
  #connect-error { color: #dc2626; font-size: 0.85rem; display: none; }

  /* ── Chat screen ── */
  #chat-screen { flex: 1; display: none; flex-direction: column; }

  #chat-header {
    padding: 14px 20px;
    background: #4f46e5;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-weight: 600;
  }
  #chat-header span { font-size: 0.8rem; opacity: 0.75; }
  #disconnect-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: #fff;
    padding: 5px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
  }
  #disconnect-btn:hover { background: rgba(255,255,255,0.3); }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .msg {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 0.9rem;
    line-height: 1.5;
    word-break: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: #4f46e5;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: #f3f4f6;
    color: #111;
    border-bottom-left-radius: 4px;
  }
  .msg.assistant p { margin-bottom: 8px; }
  .msg.assistant p:last-child { margin-bottom: 0; }
  .msg.assistant pre {
    background: #1e1e2e;
    color: #cdd6f4;
    padding: 10px;
    border-radius: 6px;
    overflow-x: auto;
    font-size: 0.82rem;
    margin: 6px 0;
  }
  .msg.assistant code { font-family: monospace; font-size: 0.87em; }
  .msg.assistant ul, .msg.assistant ol { padding-left: 18px; }

  .msg-file {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.15);
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 0.8rem;
    margin-top: 6px;
  }

  .typing {
    align-self: flex-start;
    background: #f3f4f6;
    border-radius: 12px;
    border-bottom-left-radius: 4px;
    padding: 10px 16px;
    display: none;
  }
  .typing span {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #9ca3af;
    animation: bounce 1.2s infinite;
    margin: 0 2px;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40%           { transform: translateY(-6px); }
  }

  #input-area {
    padding: 14px 16px;
    border-top: 1px solid #e5e7eb;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  #file-preview {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .file-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #ede9fe;
    color: #4f46e5;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 0.78rem;
  }
  .file-chip button {
    background: none;
    border: none;
    cursor: pointer;
    color: #4f46e5;
    padding: 0;
    font-size: 0.9rem;
    line-height: 1;
  }

  #input-row { display: flex; gap: 8px; align-items: flex-end; }
  #msg-input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 0.95rem;
    resize: none;
    outline: none;
    max-height: 120px;
    line-height: 1.4;
    transition: border-color 0.15s;
  }
  #msg-input:focus { border-color: #4f46e5; }

  #file-btn {
    width: 40px; height: 40px;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    color: #6b7280;
    transition: border-color 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  #file-btn:hover { border-color: #4f46e5; color: #4f46e5; }

  #send-btn {
    width: 40px; height: 40px;
    background: #4f46e5;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  #send-btn:hover { background: #4338ca; }
  #send-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

  #file-input { display: none; }
</style>
</head>
<body>
<div id="app">

  <!-- Connect screen -->
  <div id="connect-screen">
    <h1>OpenTalon Chat</h1>
    <p>Connect to your OpenTalon WebSocket channel using a profile token.</p>

    <div class="field">
      <label for="ws-url">WebSocket URL</label>
      <input id="ws-url" type="text" value="ws://localhost:9000/ws" placeholder="ws://localhost:9000/ws">
    </div>

    <div class="field">
      <label for="token-input">Profile Token</label>
      <input id="token-input" type="text" placeholder="your-profile-token">
    </div>

    <button id="connect-btn">Connect</button>
    <div id="connect-error"></div>
  </div>

  <!-- Chat screen -->
  <div id="chat-screen">
    <div id="chat-header">
      <div>OpenTalon Chat</div>
      <button id="disconnect-btn">Disconnect</button>
    </div>

    <div id="messages">
      <div class="typing" id="typing">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div id="input-area">
      <div id="file-preview"></div>
      <div id="input-row">
        <button id="file-btn" title="Attach file">📎</button>
        <textarea id="msg-input" rows="1" placeholder="Type a message…"></textarea>
        <button id="send-btn" title="Send">➤</button>
      </div>
    </div>
  </div>

</div>

<input type="file" id="file-input" accept=".csv,.pdf,image/*" multiple>

<script>
  let ws = null;
  let pendingFiles = []; // [{name, mime_type, data (base64)}]

  const connectScreen = document.getElementById('connect-screen');
  const chatScreen    = document.getElementById('chat-screen');
  const connectBtn    = document.getElementById('connect-btn');
  const connectError  = document.getElementById('connect-error');
  const disconnectBtn = document.getElementById('disconnect-btn');
  const messages      = document.getElementById('messages');
  const typing        = document.getElementById('typing');
  const msgInput      = document.getElementById('msg-input');
  const sendBtn       = document.getElementById('send-btn');
  const fileBtn       = document.getElementById('file-btn');
  const fileInput     = document.getElementById('file-input');
  const filePreview   = document.getElementById('file-preview');

  // ── Connect ──────────────────────────────────────────────

  connectBtn.addEventListener('click', connect);
  document.getElementById('token-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') connect();
  });

  function connect() {
    const url   = document.getElementById('ws-url').value.trim();
    const token = document.getElementById('token-input').value.trim();
    if (!token) { showError('Token is required.'); return; }

    const fullURL = url + (url.includes('?') ? '&' : '?') + 'token=' + encodeURIComponent(token);
    connectError.style.display = 'none';
    connectBtn.disabled = true;
    connectBtn.textContent = 'Connecting…';

    ws = new WebSocket(fullURL);

    ws.onopen = () => {
      connectScreen.style.display = 'none';
      chatScreen.style.display = 'flex';
      connectBtn.disabled = false;
      connectBtn.textContent = 'Connect';
      appendSystem('Connected. Say hello!');
    };

    ws.onmessage = e => {
      typing.style.display = 'none';
      const frame = JSON.parse(e.data);
      appendAssistant(frame.content || '');
    };

    ws.onerror = () => {
      showError('Connection failed. Check the URL and try again.');
      connectBtn.disabled = false;
      connectBtn.textContent = 'Connect';
    };

    ws.onclose = () => {
      if (chatScreen.style.display === 'flex') {
        appendSystem('Disconnected.');
        chatScreen.style.display = 'none';
        connectScreen.style.display = 'flex';
        connectBtn.disabled = false;
        connectBtn.textContent = 'Connect';
      }
    };
  }

  disconnectBtn.addEventListener('click', () => {
    if (ws) ws.close();
  });

  function showError(msg) {
    connectError.textContent = msg;
    connectError.style.display = 'block';
  }

  // ── Send ─────────────────────────────────────────────────

  sendBtn.addEventListener('click', sendMessage);
  msgInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  // Auto-resize textarea
  msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
  });

  function sendMessage() {
    const content = msgInput.value.trim();
    if (!content && pendingFiles.length === 0) return;
    if (!ws || ws.readyState !== WebSocket.OPEN) return;

    const frame = { content, files: pendingFiles.slice() };
    ws.send(JSON.stringify(frame));

    appendUser(content, pendingFiles.map(f => f.name));
    msgInput.value = '';
    msgInput.style.height = 'auto';
    pendingFiles = [];
    filePreview.innerHTML = '';
    typing.style.display = 'block';
    messages.scrollTop = messages.scrollHeight;
  }

  // ── File attachment ───────────────────────────────────────

  fileBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', () => {
    const files = Array.from(fileInput.files);
    files.forEach(readFile);
    fileInput.value = '';
  });

  function readFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
      const base64 = e.target.result.split(',')[1];
      pendingFiles.push({ name: file.name, mime_type: file.type || 'application/octet-stream', data: base64 });
      renderFileChip(file.name, pendingFiles.length - 1);
    };
    reader.readAsDataURL(file);
  }

  function renderFileChip(name, idx) {
    const chip = document.createElement('div');
    chip.className = 'file-chip';
    chip.dataset.idx = idx;
    chip.innerHTML = `📄 ${escHtml(name)} <button title="Remove">×</button>`;
    chip.querySelector('button').addEventListener('click', () => {
      pendingFiles.splice(idx, 1);
      chip.remove();
    });
    filePreview.appendChild(chip);
  }

  // ── Message rendering ─────────────────────────────────────

  function appendUser(content, fileNames) {
    const div = document.createElement('div');
    div.className = 'msg user';
    if (content) div.textContent = content;
    fileNames.forEach(n => {
      const f = document.createElement('div');
      f.className = 'msg-file';
      f.textContent = '📄 ' + n;
      div.appendChild(f);
    });
    messages.insertBefore(div, typing);
    scrollToBottom();
  }

  function appendAssistant(html) {
    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.innerHTML = html; // server sends Markdown (FormatMarkdown) — convert with marked.js or similar
    messages.insertBefore(div, typing);
    scrollToBottom();
  }

  function appendSystem(text) {
    const div = document.createElement('div');
    div.style.cssText = 'text-align:center;color:#9ca3af;font-size:0.78rem;padding:4px 0';
    div.textContent = text;
    messages.insertBefore(div, typing);
    scrollToBottom();
  }

  function scrollToBottom() {
    messages.scrollTop = messages.scrollHeight;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
